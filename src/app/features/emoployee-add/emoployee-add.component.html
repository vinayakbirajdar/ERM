<div class="edit-employee-container">
  <div class="edit-card">
    <h2>Add Employee</h2>

    <form #employeeForm="ngForm">
      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          [(ngModel)]="employee.name"
          name="name"
          required
          #name="ngModel"
        />
        <p *ngIf="name.invalid && name.touched" class="error">
          Please enter employee name
        </p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="employee.email"
          name="email"
          required
          email
          #email="ngModel"
        />
        <p *ngIf="email.invalid && email.touched" class="error">
          Please enter a valid email
        </p>
      </div>

      <div class="form-group">
        <label>Department</label>
        <input
          type="text"
          [(ngModel)]="employee.department"
          name="department"
          required
          #department="ngModel"
        />
        <p *ngIf="department.invalid && department.touched" class="error">
          Department is required
        </p>
      </div>

      <div class="form-group">
        <label>Designation</label>
        <input
          type="text"
          [(ngModel)]="employee.designation"
          name="designation"
          required
          #designation="ngModel"
        />
        <p *ngIf="designation.invalid && designation.touched" class="error">
          Designation is required
        </p>
      </div>

      <div class="form-group">
        <label>Salary</label>
        <input
          type="number"
          [(ngModel)]="employee.salary"
          name="salary"
          required
          min="1000"
          #salary="ngModel"
        />
        <p *ngIf="salary.invalid && salary.touched" class="error">
          Salary must be greater than 1000
        </p>
      </div>

      <div class="form-group">
        <label>Joining Date</label>
        <input
          type="date"
          [(ngModel)]="employee.joiningDate"
          name="joiningDate"
          required
          #joiningDate="ngModel"
        />
        <p *ngIf="joiningDate.invalid && joiningDate.touched" class="error">
          Joining date is required
        </p>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input
            type="checkbox"
            [(ngModel)]="employee.isActive"
            name="isActive"
          />
          Active Employee
        </label>
      </div>
    </form>

    <div class="actions">
      <button class="btn-primary" (click)="addEmployee()">Add</button>
      <button class="btn-secondary" (click)="goBack()">Cancel</button>
    </div>
  </div>
</div>
